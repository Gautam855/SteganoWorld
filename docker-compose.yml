version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: steganoworld-server
    ports:
      - "5001:5001"
    env_file:
      - ./server/.env
    environment:
      - PORT=5001
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: steganoworld-client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001
    depends_on:
      - server
    restart: unless-stopped
